name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r frontend/requirements.txt

      - name: Compile every source file
        run: python -m compileall -q agents mcp_servers frontend main.py entity.py

      - name: Import the backend and the MCP servers
        env:
          CONVEX_BASE_URL: https://standing-fish-574.convex.site
          OPENAI_API_KEY: not-a-real-key-import-check-only
        run: |
          python -c "import main"
          python -c "import agents.graph, agents.nodes, agents.mcp_client"
          python -c "import mcp_servers.hotel_server, mcp_servers.flight_server, mcp_servers.weather_server"

      - name: Import the frontend
        env:
          BACKEND_URL: http://127.0.0.1:8000
        run: python -c "import sys; sys.path.insert(0, 'frontend'); import app"
